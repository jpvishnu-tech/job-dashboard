<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tell the browser which colour schemes this app supports so native
         UI chrome (scrollbars, form controls) adapts alongside the theme. -->
    <meta name="color-scheme" content="light dark" />
    <title>Job Dashboard</title>

    <!-- Material Icons — used throughout for sidebar, navbar, and table icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <!-- Inter — the primary typeface for the whole UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- React mounts the entire application into this single div -->
    <div id="root"></div>
    <!-- Vite resolves this ES-module import and injects HMR/build logic -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
